<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷 皮皮剧本工坊</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f0eb;
            color: #2d2d2d;
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #2d5a27, #3a7d32);
            padding: 16px 32px;
            display: flex; align-items: center; gap: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        }
        .navbar .logo { font-size: 28px; }
        .navbar h1 { color: #fff; font-size: 22px; font-weight: 700; }
        .navbar .subtitle { color: rgba(255,255,255,0.8); font-size: 13px; margin-left: auto; }
        .container { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }

        /* Card 基础 */
        .card {
            background: #fff; border-radius: 16px; padding: 28px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 20px;
        }
        .card h2 { font-size: 18px; font-weight: 900; color: #2d5a27; margin-bottom: 16px; }

        /* 输入区 */
        .input-row { display: flex; gap: 12px; }
        .input-row input {
            flex: 1; padding: 14px 18px; border: 2px solid #e0d8cf;
            border-radius: 12px; font-size: 15px; font-family: inherit; outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: #3a7d32; }
        .hint { font-size: 13px; color: #999; margin-bottom: 12px; }
        .hint em { color: #3a7d32; font-style: normal; }

        /* 按钮 */
        .btn {
            padding: 14px 28px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; font-family: inherit;
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(135deg, #3a7d32, #4a9e3f); color: #fff;
            box-shadow: 0 2px 8px rgba(58,125,50,0.25);
        }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(58,125,50,0.35); }
        .btn-outline {
            background: #fff; color: #3a7d32; border: 2px solid #3a7d32;
        }
        .btn-outline:hover { background: #f0f9ee; }
        .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; }
        .btn-xs { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
        .btn-gold {
            background: linear-gradient(135deg, #f0a030, #f5c842); color: #5a3a1a;
            border: none; box-shadow: 0 2px 8px rgba(240,160,48,0.25);
        }
        .btn-gold:hover { box-shadow: 0 4px 16px rgba(240,160,48,0.4); }

        /* 加载 */
        .loading { display: none; text-align: center; padding: 30px; color: #999; }
        .loading.active { display: block; }
        .spinner {
            width: 36px; height: 36px; border: 3px solid #e0d8cf;
            border-top: 3px solid #3a7d32; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 灵感卡片 */
        .ideas-grid { display: grid; gap: 10px; margin-top: 12px; }
        .idea-card {
            background: #fdfcf7; border: 1.5px solid #ece6da;
            border-radius: 12px; padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; transition: all 0.2s;
        }
        .idea-card:hover { border-color: #f0c75e; background: #fffbef; }
        .idea-card .idea-text { flex: 1; font-size: 14px; line-height: 1.6; color: #333; }
        .idea-card .idea-actions { display: flex; gap: 6px; align-items: center; }
        .idea-card .type-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            font-weight: 500; white-space: nowrap;
        }
        .badge-edu { background: #e8f5e9; color: #2d5a27; }
        .badge-fun { background: #fff3e0; color: #e65100; }
        .badge-warm { background: #fce4ec; color: #c62828; }
        .badge-creative { background: #e3f2fd; color: #1565c0; }

        /* 剧集列表 */
        .episode-list { margin-top: 8px; }
        .episode-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-radius: 12px; margin-bottom: 6px;
            border: 1px solid #ece6da; background: #fafaf7;
            transition: all 0.15s; cursor: pointer; gap: 12px;
        }
        .episode-item:hover { background: #f0f9ee; border-color: #c8e0c0; }
        .episode-item .ep-num {
            font-weight: 900; font-size: 18px; color: #2d5a27;
            min-width: 48px; text-align: center;
        }
        .episode-item .ep-info { flex: 1; }
        .episode-item .ep-title { font-weight: 700; font-size: 15px; color: #2d2d2d; }
        .episode-item .ep-topic { font-size: 12px; color: #999; margin-top: 2px; }
        .episode-item .ep-status {
            font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 500;
        }
        .status-draft { background: #fff3e0; color: #e65100; }
        .status-completed { background: #e8f5e9; color: #2d5a27; }
        .episode-item .ep-delete {
            color: #ccc; background: none; border: none; cursor: pointer;
            font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: 0.15s;
        }
        .episode-item .ep-delete:hover { color: #e53935; background: #ffebee; }
        .episode-item .ep-edit {
            color: #3a7d32; background: none; border: none; cursor: pointer;
            font-size: 14px; padding: 4px 8px; border-radius: 6px; transition: 0.15s;
            text-decoration: none;
        }
        .episode-item .ep-edit:hover { background: #e8f5e9; }

        /* 分页 */
        .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 16px; align-items: center; }
        .pagination button {
            padding: 6px 14px; border: 1.5px solid #e0d8cf; background: #fff;
            border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px;
            transition: all 0.15s;
        }
        .pagination button:hover { border-color: #3a7d32; }
        .pagination button.active { background: #3a7d32; color: #fff; border-color: #3a7d32; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination .page-info { font-size: 13px; color: #999; padding: 0 8px; }

        /* 结果区 */
        .result-area { display: none; }
        .result-area.active { display: block; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .section-card {
            background: #fff; border-radius: 16px; padding: 24px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 16px; position: relative;
        }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
        }
        .section-title { font-weight: 900; font-size: 17px; }
        .optimize-row { display: flex; gap: 8px; align-items: center; }
        .optimize-row input {
            padding: 8px 12px; border: 1.5px solid #e0d8cf;
            border-radius: 8px; font-size: 13px; font-family: inherit; width: 180px; outline: none;
        }
        .optimize-row input:focus { border-color: #3a7d32; }

        /* Markdown 内容 */
        .content-body { line-height: 1.75; font-size: 14px; color: #333; }
        .content-body h3 { font-size: 16px; font-weight: 700; color: #2d5a27; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #f0e8dc; }
        .content-body h4 { font-size: 14px; font-weight: 700; color: #555; margin: 12px 0 6px; }
        .content-body strong { color: #2d5a27; }
        .content-body p { margin: 6px 0; }
        .scene-desc { background: #fefcf7; border-left: 3px solid #f0c75e; padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 8px 0; font-size: 13px; color: #5a4a3a; }
        .storyboard-item { background: #fafaf7; border-radius: 10px; padding: 10px 14px; margin: 8px 0; border: 1px solid #ece6da; }
        .video-prompt-box { background: #f7faf5; border: 1px solid #c8e0c0; border-radius: 10px; padding: 12px 16px; margin: 8px 0; font-size: 13px; color: #3a5a32; }
        .tips-box { background: #fdf6f0; border: 1px solid #f0d8b8; border-radius: 10px; padding: 10px 14px; margin: 8px 0; font-size: 13px; color: #8a6a4a; }

        .error-msg { background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b; padding: 14px 18px; border-radius: 12px; margin-bottom: 16px; display: none; }
        .error-msg.active { display: block; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #2d5a27; color: #fff; padding: 12px 28px; border-radius: 10px;
            font-weight: 700; font-size: 14px; z-index: 999; opacity: 0;
            transition: opacity 0.3s; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .toast.show { opacity: 1; }
        .footer { text-align: center; color: #bbb; font-size: 12px; padding: 20px; }
        .empty-state { text-align: center; padding: 40px; color: #ccc; font-size: 14px; }

        /* 编辑弹窗 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #fff; border-radius: 16px; padding: 28px; width: 90%; max-width: 800px;
            max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .modal-box h3 { font-size: 18px; font-weight: 900; color: #2d5a27; margin-bottom: 16px; }
        .modal-box textarea {
            flex: 1; min-height: 300px; border: 2px solid #e0d8cf; border-radius: 12px;
            padding: 14px; font-family: 'Noto Sans SC', monospace; font-size: 13px;
            line-height: 1.6; resize: vertical; outline: none;
        }
        .modal-box textarea:focus { border-color: #3a7d32; }
        .modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

        @media (max-width: 640px) {
            .input-row { flex-direction: column; }
            .optimize-row input { width: 120px; }
            .section-header { flex-direction: column; align-items: flex-start; }
            .ideas-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="logo">🐷</span>
    <h1>皮皮剧本工坊</h1>
    <span class="subtitle">一句话梗概 → 完整剧本</span>
</nav>

<div class="toast" id="toast"></div>

<div class="container">

    <!-- ========== 输入区域 ========== -->
    <div class="card">
        <h2>📝 输入一句话梗概</h2>
        <div class="hint">例：<em>皮皮把客厅搞得一团糟，猪妈妈回来前要紧急收拾</em></div>
        <div class="input-row">
            <input type="text" id="topicInput" placeholder="在这里输入你的创意梗概…" maxlength="200">
            <button class="btn btn-primary" id="btnGenerate" onclick="doGenerate()">✨ 生成剧本</button>
        </div>
    </div>

    <!-- ========== 灵感生成器 ========== -->
    <div class="card">
        <h2>💡 灵感生成器</h2>
        <p style="font-size:13px;color:#999;margin-bottom:14px;">随机生成有趣、健康、有教育意义的创意梗概，选中后自动加入剧集列表</p>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <button class="btn btn-gold" id="btnIdeas" onclick="doGenerateIdeas()">🎲 帮我设计5个梗概</button>
            <button class="btn btn-outline btn-sm" id="btnReIdeas" style="display:none;" onclick="doGenerateIdeas()">🔄 换一批</button>
        </div>
        <div style="margin-top:4px;">
            <span id="ideasLoading" style="display:none;font-size:13px;color:#999;">正在生成灵感…</span>
            <span id="ideasError" style="display:none;font-size:13px;color:#e53935;"></span>
        </div>
        <div class="ideas-grid" id="ideasGrid"></div>
    </div>

    <!-- ========== 我的剧集 ========== -->
    <div class="card">
        <h2>📺 我的剧集 <span id="epCount" style="font-weight:400;font-size:13px;color:#999;"></span></h2>
        <div class="episode-list" id="episodeList">
            <div class="empty-state">还没有剧集，用上方灵感生成器或手动输入梗概开始吧！</div>
        </div>
        <div class="pagination" id="pagination" style="display:none;"></div>
    </div>

    <!-- ========== 加载动画 ========== -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在生成剧本，请稍候…</p>
    </div>

    <!-- ========== 错误提示 ========== -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- ========== 结果区域 ========== -->
    <div class="result-area" id="resultArea">
        <div class="toolbar">
            <span style="font-weight:700;color:#2d5a27;margin-right:8px;align-self:center;" id="resultTitle"></span>
            <button class="btn btn-outline btn-sm" onclick="doRegenerate()">🔄 重新生成</button>
            <button class="btn btn-outline btn-sm" onclick="doCopyVideo(1)">📋 复制视频1</button>
            <button class="btn btn-outline btn-sm" onclick="doCopyVideo(2)">📋 复制视频2</button>
            <button class="btn btn-outline btn-sm" onclick="doSaveScript()">💾 保存到剧集</button>
        </div>

        <!-- 👥 出场角色 -->
        <div class="section-card" id="charactersSection" style="display:none;">
            <div class="section-header"><span class="section-title">👥 出场角色</span></div>
            <div class="content-body" id="charactersContent"></div>
        </div>

        <!-- 🎬 视频1 -->
        <div class="section-card" id="video1Section">
            <div class="section-header">
                <span class="section-title">🎬 视频1（15秒）</span>
                <div class="optimize-row">
                    <input type="text" id="video1Keywords" placeholder="优化关键字">
                    <button class="btn btn-outline btn-sm" onclick="doOptimize('video1')">优化视频1</button>
                </div>
            </div>
            <div class="content-body" id="video1Content"></div>
        </div>

        <!-- 🎬 视频2 -->
        <div class="section-card" id="video2Section">
            <div class="section-header">
                <span class="section-title">🎬 视频2（15秒）</span>
                <div class="optimize-row">
                    <input type="text" id="video2Keywords" placeholder="优化关键字">
                    <button class="btn btn-outline btn-sm" onclick="doOptimize('video2')">优化视频2</button>
                </div>
            </div>
            <div class="content-body" id="video2Content"></div>
        </div>

        <div class="section-card" id="tipsSection" style="display:none;">
            <div class="section-header"><span class="section-title">💡 制作提示</span></div>
            <div class="content-body" id="tipsContent"></div>
        </div>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEditModal()">
    <div class="modal-box">
        <h3>✏️ 编辑剧本 — <span id="editEpTitle"></span></h3>
        <textarea id="editTextarea" placeholder="在此编辑剧本内容（Markdown格式）…"></textarea>
        <div class="modal-actions">
            <button class="btn btn-outline btn-sm" onclick="closeEditModal()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="saveEdit()">💾 保存修改</button>
        </div>
    </div>
</div>

<div class="footer">🐷 皮皮剧本工坊 · 即梦AI短视频专用 · Powered by DeepSeek</div>

<script>
// ========== 全局状态 ==========
let currentTopic = '';
let currentContent = '';
let currentEpisodeId = null;
let currentPage = 1;

// ========== 工具 ==========
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}
function showError(msg) { const e = document.getElementById('errorMsg'); e.textContent = '⚠ ' + msg; e.classList.add('active'); }
function hideError() { document.getElementById('errorMsg').classList.remove('active'); }
function setLoading(v) { document.getElementById('loading').classList.toggle('active', v); document.getElementById('btnGenerate').disabled = v; }

// ========== Markdown 解析 ==========
function parseContent(md) {
    const sections = { characters: '', video1: '', video2: '', tips: '' };
    let cur = null, buf = [];
    for (const line of md.split('\n')) {
        if (line.match(/^###?\s*(👥|出场角色)/)) { if(cur) sections[cur]=buf.join('\n').trim(); cur='characters'; buf=[]; continue; }
        if (line.match(/^###?\s*🎬\s*视频1/)) { if(cur) sections[cur]=buf.join('\n').trim(); cur='video1'; buf=[]; continue; }
        if (line.match(/^###?\s*🎬\s*视频2/)) { if(cur) sections[cur]=buf.join('\n').trim(); cur='video2'; buf=[]; continue; }
        if (line.match(/^###?\s*(💡|制作提示)/)) { if(cur) sections[cur]=buf.join('\n').trim(); cur='tips'; buf=[]; continue; }
        buf.push(line);
    }
    if(cur) sections[cur]=buf.join('\n').trim();
    return sections;
}

function renderMarkdown(md) {
    if(!md) return '';
    let h = md.replace(/^#### (.+)$/gm, '<h4>$1</h4>').replace(/^### (.+)$/gm, '<h3>$1</h3>');
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/^(?!<[hdiv])(.+)$/gm, '<p>$1</p>').replace(/<p>\s*<\/p>/g, '');
    return h;
}

function displayResult(content) {
    currentContent = content; hideError();
    const s = parseContent(content);
    const charEl = document.getElementById('charactersSection');
    if(s.characters) { document.getElementById('charactersContent').innerHTML = renderMarkdown(s.characters); charEl.style.display='block'; }
    else charEl.style.display='none';
    document.getElementById('video1Content').innerHTML = renderMarkdown(s.video1);
    document.getElementById('video2Content').innerHTML = renderMarkdown(s.video2);
    const tipsEl = document.getElementById('tipsSection');
    if(s.tips) { document.getElementById('tipsContent').innerHTML = renderMarkdown(s.tips); tipsEl.style.display='block'; }
    else tipsEl.style.display='none';
    document.getElementById('resultArea').classList.add('active');
    document.getElementById('resultTitle').textContent = '📋 ' + (currentTopic.length > 30 ? currentTopic.slice(0,30)+'…' : currentTopic);
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});
}

// ========== 剧本生成 ==========
async function doGenerate(topic) {
    const t = topic || document.getElementById('topicInput').value.trim();
    if(!t) { showError('请先输入一句话梗概'); return; }
    currentTopic = t; hideError(); setLoading(true);
    try {
        const r = await fetch('/api/generate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:t})});
        const d = await r.json();
        if(d.ok) { displayResult(d.content); toast('✅ 剧本生成完成！'); }
        else showError(d.error||'生成失败');
    } catch(e) { showError('网络请求失败：'+e.message); }
    finally { setLoading(false); }
}

// ========== 优化 ==========
async function doOptimize(section) {
    if(!currentContent) { showError('请先生成剧本'); return; }
    const kw = document.getElementById(section+'Keywords').value.trim();
    if(!kw) { showError('请输入优化关键字'); return; }
    hideError(); setLoading(true);
    try {
        const r = await fetch('/api/optimize', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:currentContent,section,keywords:kw})});
        const d = await r.json();
        if(d.ok) { displayResult(d.content); document.getElementById(section+'Keywords').value=''; toast('✅ 优化完成！'); }
        else showError(d.error||'优化失败');
    } catch(e) { showError('网络请求失败：'+e.message); }
    finally { setLoading(false); }
}

// ========== 重新生成 ==========
async function doRegenerate() {
    if(!currentTopic) { showError('没有可重新生成的梗概'); return; }
    hideError(); setLoading(true);
    try {
        const r = await fetch('/api/regenerate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:currentTopic,previous:currentContent})});
        const d = await r.json();
        if(d.ok) { displayResult(d.content); toast('🔄 已重新生成新版本！'); }
        else showError(d.error||'重新生成失败');
    } catch(e) { showError('网络请求失败：'+e.message); }
    finally { setLoading(false); }
}

// ========== 复制视频1/视频2 ==========
function doCopyVideo(videoNum) {
    if(!currentContent) return;
    const parts = splitByVideo(currentContent);
    const content = parts[videoNum] || '';
    if(!content.trim()) {
        showError('未能识别视频'+videoNum+'的内容，请检查剧本格式');
        return;
    }
    navigator.clipboard.writeText(content).then(
        ()=>toast('📋 视频'+videoNum+'内容已复制！')
    ).catch(()=>showError('复制失败'));
}

function splitByVideo(md) {
    // 新版格式：视频1和视频2各自独立，直接按 ### 🎬 视频 分割
    const result = { 1: '', 2: '' };
    const parts = md.split(/^###\s*🎬\s*视频/m);
    if(parts.length > 1) result[1] = ('### 🎬 视频' + parts[1]).trim();
    if(parts.length > 2) result[2] = ('### 🎬 视频' + parts[2].replace(/^###\s*💡[\s\S]*$/, '')).trim();
    return result;
}

// ========== 保存剧本到剧集 ==========
async function doSaveScript() {
    if(!currentContent || !currentTopic) {
        showError('请先生成剧本再保存');
        return;
    }
    hideError();

    const title = currentTopic.length > 20 ? currentTopic.slice(0,20) : currentTopic;

    // 如果已有剧集 ID（从列表点进来的），更新现有剧集；否则创建新剧集
    if(currentEpisodeId) {
        try {
            const r = await fetch('/api/episodes/save_script', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({episode_id:currentEpisodeId, script_content:currentContent})
            });
            const d = await r.json();
            if(d.ok) {
                toast('💾 剧本已保存！');
                loadEpisodes();
            } else {
                showError(d.error || '保存失败');
            }
        } catch(e) {
            showError('网络请求失败，请重试');
        }
        return;
    }

    // 没有剧集 ID：创建新剧集 + 保存剧本
    try {
        const r = await fetch('/api/episodes/create_with_script', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({title, topic:currentTopic, script_content:currentContent})
        });
        const d = await r.json();
        if(d.ok) {
            currentEpisodeId = d.episode.id;
            toast('💾 已保存为第 '+d.episode.episode_num+' 集！');
            loadEpisodes();
        } else {
            showError(d.error || '保存失败');
        }
    } catch(e) {
        showError('网络请求失败，请重试');
    }
}

// ========== 灵感生成 ==========
async function doGenerateIdeas() {
    const btn = document.getElementById('btnIdeas');
    const loadEl = document.getElementById('ideasLoading');
    const errEl = document.getElementById('ideasError');
    btn.disabled = true; loadEl.style.display = 'inline'; errEl.style.display = 'none';

    try {
        const r = await fetch('/api/ideas/generate', {method:'POST'});
        const d = await r.json();
        if(d.ok && d.ideas.length > 0) {
            renderIdeas(d.ideas);
        } else {
            errEl.textContent = d.error || '生成失败，请重试';
            errEl.style.display = 'inline';
        }
    } catch(e) {
        errEl.textContent = '网络请求失败';
        errEl.style.display = 'inline';
    } finally {
        btn.disabled = false; loadEl.style.display = 'none';
    }
}

function renderIdeas(ideas) {
    const grid = document.getElementById('ideasGrid');
    const types = ['badge-edu','badge-fun','badge-warm','badge-creative'];
    grid.innerHTML = ideas.map((idea, i) => `
        <div class="idea-card">
            <span class="type-badge ${types[i%4]}">${['益智','趣味','温情','创意'][i%4]}</span>
            <span class="idea-text">${escapeHtml(idea)}</span>
            <div class="idea-actions">
                <button class="btn btn-outline btn-xs" onclick="selectIdea('${escapeAttr(idea)}')">选用</button>
            </div>
        </div>
    `).join('');
    document.getElementById('btnReIdeas').style.display = 'inline-block';
}

function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escapeAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

async function selectIdea(topic) {
    document.getElementById('topicInput').value = topic;
    currentTopic = topic;
    currentEpisodeId = null;  // 重置，等保存时再创建剧集
    toast('✅ 已选中梗概，请点击「生成剧本」');
}

// ========== 剧集列表 ==========
async function loadEpisodes(page=1) {
    currentPage = page;
    try {
        const r = await fetch('/api/episodes/list?page='+page+'&per_page=10');
        const d = await r.json();
        renderEpisodes(d);
    } catch(e) { /* silent */ }
}

function renderEpisodes(data) {
    const list = document.getElementById('episodeList');
    const pag = document.getElementById('pagination');
    const count = document.getElementById('epCount');

    if(data.total === 0) {
        list.innerHTML = '<div class="empty-state">还没有剧集，用上方灵感生成器或手动输入梗概开始吧！</div>';
        pag.style.display = 'none';
        count.textContent = '';
        return;
    }

    count.textContent = '（共 '+data.total+' 集）';
    list.innerHTML = data.episodes.map(ep => `
        <div class="episode-item" onclick="loadEpisode(${ep.id}, '${escapeAttr(ep.topic)}')">
            <span class="ep-num">#${ep.episode_num}</span>
            <div class="ep-info">
                <div class="ep-title">${escapeHtml(ep.title)}</div>
                <div class="ep-topic">${escapeHtml(ep.topic)}</div>
            </div>
            <span class="ep-status ${ep.status==='completed'?'status-completed':'status-draft'}">${ep.status==='completed'?'已生成':'待生成'}</span>
            ${ep.status==='completed' ? `<button class="ep-edit" onclick="event.stopPropagation();openEditModal(${ep.id},'${escapeAttr(ep.title)}')" title="编辑">✏️</button>` : ''}
            <button class="ep-delete" onclick="event.stopPropagation();deleteEpisode(${ep.id})" title="删除">✕</button>
        </div>
    `).join('');

    // 分页
    if(data.total_pages <= 1) { pag.style.display = 'none'; return; }
    pag.style.display = 'flex';
    let html = `<button ${data.page<=1?'disabled':''} onclick="loadEpisodes(${data.page-1})">‹ 上一页</button>`;
    for(let p=1; p<=data.total_pages; p++) {
        html += `<button class="${p===data.page?'active':''}" onclick="loadEpisodes(${p})">${p}</button>`;
    }
    html += `<button ${data.page>=data.total_pages?'disabled':''} onclick="loadEpisodes(${data.page+1})">下一页 ›</button>`;
    html += `<span class="page-info">${data.page}/${data.total_pages}</span>`;
    pag.innerHTML = html;
}

async function loadEpisode(id, topic) {
    currentEpisodeId = id;
    currentTopic = topic;
    document.getElementById('topicInput').value = topic;
    // 尝试加载已保存的剧本
    try {
        const r = await fetch('/api/episodes/' + id);
        const d = await r.json();
        if(d.ok && d.episode && d.episode.script_content) {
            displayResult(d.episode.script_content);
            toast('📂 已加载第 '+d.episode.episode_num+' 集剧本');
            return;
        }
    } catch(e) {}
    // 没有保存的剧本，自动生成
    doGenerate(topic);
}

async function deleteEpisode(id) {
    if(!confirm('确定删除这一集吗？')) return;
    try {
        const r = await fetch('/api/episodes/'+id, {method:'DELETE'});
        const d = await r.json();
        if(d.ok) { toast('🗑 已删除'); loadEpisodes(currentPage); }
    } catch(e) { showError('删除失败'); }
}

// ========== 编辑弹窗 ==========
let editingEpisodeId = null;

async function openEditModal(id, title) {
    editingEpisodeId = id;
    document.getElementById('editEpTitle').textContent = title;
    // 加载已保存的剧本
    try {
        const r = await fetch('/api/episodes/' + id);
        const d = await r.json();
        if(d.ok && d.episode) {
            document.getElementById('editTextarea').value = d.episode.script_content || '';
        }
    } catch(e) {
        document.getElementById('editTextarea').value = '';
    }
    document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    editingEpisodeId = null;
}

async function saveEdit() {
    if(!editingEpisodeId) return;
    const content = document.getElementById('editTextarea').value;
    try {
        const r = await fetch('/api/episodes/save_script', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({episode_id:editingEpisodeId, script_content:content})
        });
        const d = await r.json();
        if(d.ok) {
            toast('💾 修改已保存！');
            closeEditModal();
            loadEpisodes();
        } else showError(d.error);
    } catch(e) { showError('保存失败'); }
}

// ========== 键盘事件 ==========
document.getElementById('topicInput').addEventListener('keydown', e => { if(e.key==='Enter') doGenerate(); });
['video1Keywords','video2Keywords'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
        if(e.key==='Enter') doOptimize(id.replace('Keywords',''));
    });
});

// ========== 初始化 ==========
loadEpisodes();
</script>
